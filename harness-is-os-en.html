<style>
  :root {
    --paper:        #FCFBF6;
    --paper-soft:   #F4F0E4;
    --paper-deep:   #ECE6D5;
    --ink:          #2A2722;
    --ink-soft:     #6B6660;
    --ink-faint:    #A8A296;
    --rule:         #C8C2B7;
    --rule-soft:    #E2DDD0;
    --blue:         #2540C8;
    --blue-soft:    #E8EBFA;
    --blue-deep:    #1A2E96;
    --orange:       #E54B2B;
    --orange-soft:  #FBDED4;
    --grounded:     #1F7A4E;
    --partial:      #C97A1F;
    --ungrounded:   #B22A2A;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 14px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: auto;
  }
  .mono  { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }
  .serif { font-family: 'Instrument Serif', Georgia, serif; }

  .page {
    min-width: 1280px;
    max-width: 1720px;
    margin: 0 auto;
    padding: 32px 44px 28px;
    display: grid;
    grid-template-rows: auto auto 1fr auto auto;
    gap: 24px;
    min-height: 100vh;
  }

  header.main {
    display: grid;
    grid-template-columns: 1fr 520px;
    gap: 40px;
    align-items: end;
  }
  .bulletin {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--ink-soft);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .byline {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .byline a {
    color: var(--ink-soft);
    text-decoration: none;
    border-bottom: 1px solid var(--rule);
    transition: color 0.15s;
  }
  .byline a:hover { color: var(--ink); }
  h1.title {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 60px;
    line-height: 0.92;
    letter-spacing: -0.025em;
    text-transform: uppercase;
    margin: 0;
    color: var(--ink);
  }

  .manifesto {
    background: var(--blue);
    color: white;
    padding: 18px 22px 14px;
    display: grid;
    gap: 12px;
  }
  .manifesto-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.62);
    text-transform: uppercase;
  }
  .manifesto-text {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.42;
    color: white;
  }
  .manifesto-text .quote-mark {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    font-style: italic;
    opacity: 0.7;
    line-height: 0;
    position: relative;
    top: 2px;
  }
  .manifesto-source {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.58);
  }
  .manifesto-controls { display: flex; gap: 6px; padding-top: 4px; flex-wrap: wrap; }
  .manifesto-hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    padding-top: 2px;
  }
  .nav-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.35);
    color: white;
    padding: 6px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.15s, transform 0.15s;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.16); }
  .nav-btn:active { transform: translateY(1px); }
  .nav-btn.replay { background: white; color: var(--blue); border-color: white; font-weight: 600; }
  .nav-btn.replay:hover { background: rgba(255,255,255,0.86); }

  .legend-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 100px;
    align-items: end;
    padding-bottom: 4px;
  }
  .legend-side {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .legend-side.right { text-align: right; align-items: flex-end; }
  .legend-num {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 44px;
    line-height: 1;
    color: var(--orange);
    letter-spacing: -0.04em;
  }
  .legend-name {
    font-family: 'Inter', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.015em;
    text-transform: uppercase;
  }
  .legend-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 2px;
  }
  .legend-rule { height: 2px; background: var(--ink); margin-top: 6px; }

  .stage {
    position: relative;
    width: 100%;
  }
  .stage svg.boards {
    display: block;
    width: 100%;
    height: auto;
    max-height: 620px;
  }

  /* Component visuals */
  .comp-body { transition: fill 0.25s ease; }
  .comp-shadow { fill: var(--ink-faint); opacity: 0.35; }
  .comp-side   { fill: var(--ink-soft); }
  .comp-top    { fill: var(--paper); stroke: var(--ink); stroke-width: 1.2; }
  .comp-top.active { fill: var(--blue-soft); stroke: var(--blue); stroke-width: 1.5; }
  .comp-top.focused { fill: var(--blue); stroke: var(--blue-deep); stroke-width: 1.8; }
  .pcb-fill    { fill: var(--paper-soft); stroke: var(--ink); stroke-width: 1.5; }
  .pcb-pin     { fill: var(--ink-soft); }
  .pcb-rail    { stroke: var(--ink-faint); stroke-width: 1; fill: none; stroke-dasharray: 3 2; }
  .pcb-rail-hot{ stroke: var(--blue); stroke-width: 2; fill: none; filter: url(#hot-glow); }
  .text-name   { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; fill: var(--ink); }
  .text-sub    { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.05em; fill: var(--ink-soft); text-transform: lowercase; }
  .text-name.on-blue { fill: white; }
  .text-sub.on-blue  { fill: rgba(255,255,255,0.78); }
  .pin-grid line { stroke: var(--ink-soft); stroke-width: 0.8; }
  .heat-spreader { fill: var(--paper-deep); stroke: var(--ink); stroke-width: 1.2; }
  .heat-spreader.active { fill: white; stroke: var(--blue); }
  .dimm-slot  { fill: var(--paper-deep); stroke: var(--ink); stroke-width: 1.2; }
  .dimm-token { fill: var(--ink-soft); }
  .dimm-token.lit { fill: var(--blue); }
  .pcie-slot  { fill: var(--ink); }
  .pcie-slot.active { fill: var(--blue); }
  .sata-port  { fill: var(--paper); stroke: var(--ink); stroke-width: 1; }
  .sata-port.active { fill: var(--blue-soft); stroke: var(--blue); }
  .cap-body   { fill: var(--paper-deep); stroke: var(--ink-soft); stroke-width: 0.8; }
  .cap-band   { stroke: var(--ink); stroke-width: 0.6; fill: none; }
  .mount-hole { fill: var(--paper); stroke: var(--ink); stroke-width: 1; }
  .board-label-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    fill: var(--ink-soft);
  }

  /* Gutter mapping arrows */
  .gutter-arrow { stroke: var(--ink-faint); stroke-width: 1.2; fill: none; stroke-dasharray: 4 3; }
  .gutter-arrow.active { stroke: var(--blue); stroke-width: 2; stroke-dasharray: 0; filter: url(#hot-glow); }
  .gutter-arrow-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    fill: var(--ink-soft);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .gutter-arrow-label.active { opacity: 1; fill: var(--blue-deep); font-weight: 600; }

  /* Operation strips — live worked-example, one per board */
  .op-strips {
    display: grid;
    grid-template-columns: 740fr 160fr 740fr;  /* matches SVG viewBox proportions */
    gap: 0;
    margin-top: 8px;
    align-items: stretch;
  }
  .op-strip {
    background: var(--paper-soft);
    border: 1px solid var(--rule);
    padding: 10px 14px;
    min-height: 58px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 12px;
    align-items: start;
  }
  .op-strip-left  { grid-column: 1; }
  .op-strip-right { grid-column: 3; }
  .op-strip-head {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 4px;
  }
  .op-strip-body {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 12px;
    align-items: start;
  }
  .op-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 4px 7px;
    color: var(--paper);
    background: var(--ink);
    align-self: start;
    white-space: nowrap;
    font-weight: 600;
  }
  .op-badge.cpu     { background: var(--blue); }
  .op-badge.mem     { background: var(--ink); }
  .op-badge.sched   { background: var(--ink-soft); }
  .op-badge.io      { background: var(--orange); }
  .op-badge.disk    { background: var(--grounded); }
  .op-badge.bound   { background: var(--ink); }
  .op-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    line-height: 1.5;
    white-space: pre-wrap;
    color: var(--ink);
    margin: 0;
  }
  .op-code .dim { color: var(--ink-soft); }

  .step-label {
    text-align: center;
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    min-height: 16px;
  }
  .step-label .step-word { color: var(--blue); font-weight: 600; }

  /* Detail panel */
  .detail-panel {
    background: var(--paper-soft);
    border: 1px solid var(--rule);
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 200px 1fr 1fr;
    gap: 22px;
    align-items: start;
    min-height: 122px;
  }
  .detail-panel.empty { color: var(--ink-faint); }
  .detail-head {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .detail-title {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin-top: 4px;
  }
  .detail-quote {
    font-family: 'Instrument Serif', Georgia, serif;
    font-size: 14px;
    font-style: italic;
    color: var(--ink-soft);
    line-height: 1.45;
    margin-top: 6px;
  }
  .detail-col h4 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--rule);
  }
  .detail-col ul {
    margin: 0;
    padding: 0;
    list-style: none;
    display: grid;
    gap: 4px;
  }
  .detail-col li {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    line-height: 1.4;
    color: var(--ink);
  }
  .detail-col li::before {
    content: '— ';
    color: var(--ink-faint);
  }

  /* Takeaways */
  .takeaways {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 22px;
    padding-top: 14px;
    border-top: 1px solid var(--rule);
  }
  .takeaway-cell { display: flex; flex-direction: column; gap: 6px; }
  .takeaway-head {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .takeaway-marker { width: 18px; height: 3px; background: var(--ink); }
  .takeaway-marker.blue { background: var(--blue); }
  .takeaway-marker.orange { background: var(--orange); }
  .takeaway-marker.grounded { background: var(--grounded); }
  .takeaway-text {
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    line-height: 1.45;
    color: var(--ink);
  }
  .takeaway-text strong { font-weight: 700; }
  .takeaway-cite {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
    margin-top: 2px;
  }

  /* Footer axis */
  footer.axis {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 28px;
    padding-top: 16px;
    border-top: 2px solid var(--ink);
  }
  .axis-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .axis-label.right { text-align: right; }
  .axis-dots { display: flex; gap: 28px; align-items: center; }
  .axis-dot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .axis-dot-mark { width: 9px; height: 9px; background: var(--ink-faint); }
  .axis-dot-mark.now { background: var(--blue); }
  .axis-dot-mark.then { background: var(--ink); }
  .axis-dot-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8.5px;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
    text-transform: uppercase;
    white-space: nowrap;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
  @media (max-width: 1280px) { body { overflow-x: auto; } }
</style>

<div id="root"></div>
<div id="err" style="display:none;position:fixed;top:0;left:0;right:0;padding:16px;background:#7f1d1d;color:#fee2e2;font-family:ui-monospace,monospace;font-size:12px;white-space:pre-wrap;z-index:9999;max-height:50vh;overflow:auto"></div>
<script>
  function showErr(msg) {
    var el = document.getElementById("err");
    if (!el) return;
    el.style.display = "block";
    el.textContent = (el.textContent ? el.textContent + "\n\n" : "") + msg;
  }
  window.addEventListener("error", function (e) {
    showErr("Error: " + (e.error && e.error.stack ? e.error.stack : e.message));
  });
  window.addEventListener("unhandledrejection", function (e) {
    showErr("Unhandled rejection: " + (e.reason && e.reason.stack ? e.reason.stack : e.reason));
  });
</script>

/* ====================================================================

   ==================================================================== */

const Board = ({ side, activeIds, focusedId, activeTrace, onHover, sideLabel, era, replayKey }) => {
  // PCB outline
  const W = 740, H = 540
  const pcbPath = `
    M 18 0 L ${W - 18} 0 L ${W} 18 L ${W} ${H - 18}
    L ${W - 18} ${H} L 18 ${H} L 0 ${H - 18} L 0 18 Z
  `
  return html`
    <g>
      <!-- PCB outline + drop shadow -->
      <path d=${pcbPath} transform="translate(6, 6)" className="comp-shadow"/>
      <path d=${pcbPath} className="pcb-fill"/>

      <!-- Era / side tag in corner -->
      <text x="20" y="${H - 14}" className="board-label-tag">${era}</text>
      <text x="${W - 20}" y="${H - 14}" textAnchor="end" className="board-label-tag" style=${{ fontWeight: 700, fill: "var(--ink)" }}>${sideLabel}</text>

      <!-- PCB traces (idle baseline) -->
      ${TRACES.map((t) => html`
        <path key=${`trace-base-${t.id}`} d=${t.d} className="pcb-rail"/>
      `)}
      <!-- PCB trace (animated hot pulse) -->
      ${activeTrace && html`
        <${motion.path}
          key=${`hot-${replayKey}-${side}-${activeTrace}`}
          d=${TRACES.find(t => t.id === activeTrace)?.d}
          className="pcb-rail-hot"
          initial=${{ pathLength: 0, opacity: 0.4 }}
          animate=${{ pathLength: 1, opacity: 1 }}
          transition=${{ duration: 0.55, ease: [0.25, 0.46, 0.45, 0.94] }}
        />
      `}

      <!-- Decorative bits (capacitors, ATX power, mount holes) -->
      ${DECOR.map((d, i) => {
        const C = DECOR_MAP[d.kind]
        return html`<${C} key=${`decor-${i}`} cfg=${d}/>`
      })}

      <!-- Real components -->
      ${COMPONENTS.map((cfg) => {
        const Cmp = KIND_MAP[cfg.kind]
        const isActive = activeIds.includes(cfg.id)
        const isFocused = focusedId === cfg.id
        return html`
          <${Cmp} key=${`c-${cfg.id}`} cfg=${cfg} side=${side}
            isActive=${isActive} isFocused=${isFocused} onHover=${onHover}/>
        `
      })}
    </g>
  `
}

/* ====================================================================
   GUTTER ARROWS — six curves linking left-component to right-component.
   ==================================================================== */

const GUTTER_X = 740 + 80   // right edge of left board + half gutter
const RIGHT_X  = 740 + 160  // left edge of right board

// Y-anchors are offset so the six arrows don't overlap in the cpu/ram/drivers band.
// Positive bend curves DOWNWARD, negative curves UPWARD.
const COMPONENT_GUTTER_Y = {
  app:     78,
  os:      165,
  ram:     272,    // sits above CPU
  cpu:     320,    // CPU socket centre
  drivers: 360,    // sits below CPU
  disk:    445,
}

const GUTTER_BEND = {
  app:     -10,    // gentle upward bow
  os:      -8,
  ram:     -16,    // bow up (away from cpu line)
  cpu:     0,      // straight horizontal — the "central" mapping
  drivers: 16,     // bow down (away from cpu line)
  disk:    -8,
}

const ARROW_LABEL = {
  app:     "program",
  os:      "scheduler",
  cpu:     "compute",
  ram:     "working memory",
  drivers: "IO mediation",
  disk:    "persistent store",
}

const GutterArrows = ({ activeIds, focusedId }) => {
  const cx = GUTTER_X
  const leftAnchor = (id) => ({ x: 740 - 8, y: COMPONENT_GUTTER_Y[id] })
  const rightAnchor = (id) => ({ x: RIGHT_X + 8, y: COMPONENT_GUTTER_Y[id] })

  return html`
    <g>
      ${Object.keys(COMPONENT_GUTTER_Y).map((id) => {
        const a = leftAnchor(id), b = rightAnchor(id)
        const my = (a.y + b.y) / 2
        const bend = GUTTER_BEND[id]
        const controlY = my + bend
        const d = `M ${a.x} ${a.y} Q ${cx} ${controlY} ${b.x} ${b.y}`
        const isActive = activeIds.includes(id) || focusedId === id
        // Label sits at the apex of the curve (slightly offset for readability)
        const labelY = controlY + (bend <= 0 ? -6 : 14)
        return html`
          <${React.Fragment} key=${`ga-${id}`}>
            <path d=${d} className=${`gutter-arrow ${isActive ? "active" : ""}`}/>
            <polygon
              points="${b.x},${b.y} ${b.x - 6},${b.y - 4} ${b.x - 6},${b.y + 4}"
              fill=${isActive ? "var(--blue)" : "var(--ink-faint)"}/>
            <polygon
              points="${a.x},${a.y} ${a.x + 6},${a.y - 4} ${a.x + 6},${a.y + 4}"
              fill=${isActive ? "var(--blue)" : "var(--ink-faint)"}/>
            <text x=${cx} y=${labelY} textAnchor="middle"
              className=${`gutter-arrow-label ${isActive ? "active" : ""}`}>
              ${ARROW_LABEL[id]}
            </text>
          </${React.Fragment}>
        `
      })}
    </g>
  `
}

        </div>
      </div>
    </${motion.div}>
  `
  return html`
    <div className="op-strips">
      ${cell("classical", heads.classical)}
      <div></div>
      ${cell("agentic",   heads.agentic)}
    </div>
  `
}

/* ====================================================================
   ROOT APP
   ==================================================================== */

const STEP_INTERVAL_MS = 1100

const App = () => {
  const [stepIdx, setStepIdx] = useState(0)
  const [focusedId, setFocusedId] = useState(null)
  const [paused, setPaused] = useState(false)
  const [replayKey, setReplayKey] = useState(0)

  // tick driver
  useEffect(() => {
    if (paused || focusedId) return
    const t = setInterval(() => {
      setStepIdx((i) => (i + 1) % TRACE_SEQ.length)
    }, STEP_INTERVAL_MS)
    return () => clearInterval(t)
  }, [paused, focusedId])

  const step = TRACE_SEQ[stepIdx]
  const activeIds = useMemo(() => step.active.split("+"), [step.active])
  const activeTrace = step.trace

  const onHover = (id) => setFocusedId(id)

  const handleReplay = () => {
    setStepIdx(0)
    setFocusedId(null)
    setReplayKey(k => k + 1)
  }

  // Manual stepping pauses the auto-cycle so the user can dwell on a step.
  const stepBy = (delta) => {
    setPaused(true)
    setFocusedId(null)
    setStepIdx(i => (i + delta + TRACE_SEQ.length) % TRACE_SEQ.length)
  }

  // Keyboard navigation — arrow keys step through TRACE_SEQ.
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "ArrowRight") { e.preventDefault(); stepBy(1) }
      else if (e.key === "ArrowLeft")  { e.preventDefault(); stepBy(-1) }
      else if (e.key === " ")          { e.preventDefault(); setPaused(p => !p) }
    }
    window.addEventListener("keydown", onKey)
    return () => window.removeEventListener("keydown", onKey)
  }, [])

  // Compact step indicator: shows the worked-example progress, not the abstract trace state.
  const stepDescription = useMemo(() => {
    if (focusedId) {
      const c = COMPONENTS.find(c => c.id === focusedId)
      if (c) return `Paused · ${c.classic.name} ↔ ${c.agentic.name}`
    }
    return `Step ${stepIdx + 1} / ${TRACE_SEQ.length} · ${step.active.replace("+", " → ")}`
  }, [stepIdx, step, focusedId])

  return html`
    <div className="page">
      <header className="main">
        <div>
          <div className="bulletin">Interactive comparison · Classical vs Agentic Architecture · May 2026</div>
          <div className="byline">By Witek ten Hove · <a href="mailto:witek@businessdatasolutions.nl">witek@businessdatasolutions.nl</a></div>
          <h1 className="title">
            Same problems,<br/>
            same architecture.
          </h1>
        </div>
        <div className="manifesto">
          <div className="manifesto-label">From the wiki · agent-harness.md</div>
          <div className="manifesto-text">
            <span className="quote-mark">“</span>The raw LLM is the <strong>CPU</strong> — powerful but inert. No memory, no storage, no IO. Your context window acts as <strong>RAM</strong> — fast but limited. External databases serve as <strong>disk</strong>. Tool integrations are <strong>device drivers</strong>. And the <strong>harness</strong> is the <strong>operating system</strong>, deciding what the CPU sees and when.<span className="quote-mark">”</span>
          </div>
          <div className="manifesto-source">§ The operating-system analogy</div>
          <div className="manifesto-controls">
            <button className="nav-btn" onClick=${() => stepBy(-1)} title="Previous step (←)">◀ Prev</button>
            <button className="nav-btn" onClick=${() => stepBy(1)}  title="Next step (→)">Next ▶</button>
            <button className="nav-btn" onClick=${() => setPaused(p => !p)} title="Toggle auto-cycle (space)">
              ${paused ? "▶ Play" : "❚❚ Pause"}
            </button>
            <button className="nav-btn replay" onClick=${handleReplay} title="Restart at step 1">⟳ Replay</button>
          </div>
          <div className="manifesto-hint">Use ← → to step through · space to pause/resume</div>
        </div>
      </header>

      <div className="legend-row">
        <div className="legend-side">
          <div className="legend-num">01</div>
          <div className="legend-name">Classical Computer</div>
          <div className="legend-sub">1969 · Hardware · Silicon substrate</div>
          <div className="legend-rule"></div>
        </div>
        <div className="legend-side right">
          <div className="legend-num">02</div>
          <div className="legend-name">Agent Harness</div>
          <div className="legend-sub">2026 · Software · Language substrate</div>
          <div className="legend-rule"></div>
        </div>
      </div>

      <div className="stage">
        <svg className="boards" viewBox="0 0 1640 560" preserveAspectRatio="xMidYMid meet">
          <defs>
            <filter id="hot-glow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="1.6"/>
              <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>

          <!-- left board -->
          <g transform="translate(0, 10)">
            <${Board}
              side="classic"
              activeIds=${activeIds}
              focusedId=${focusedId}
              activeTrace=${activeTrace}
              onHover=${onHover}
              sideLabel="CLASSICAL"
              era="ATX REFERENCE BOARD · v1.7"
              replayKey=${replayKey}
            />
          </g>

          <!-- gutter arrows in the centre -->
          <g transform="translate(0, 10)">
            <${GutterArrows} activeIds=${activeIds} focusedId=${focusedId}/>
          </g>

          <!-- right board -->
          <g transform="translate(900, 10)">
            <${Board}
              side="agentic"
              activeIds=${activeIds}
              focusedId=${focusedId}
              activeTrace=${activeTrace}
              onHover=${onHover}
              sideLabel="AGENTIC"
              era="HARNESS REFERENCE BOARD · v0.1"
              replayKey=${replayKey}
            />
          </g>
        </svg>
        <${OpStrips}
          stepIdx=${stepIdx}
          replayKey=${replayKey}
          heads=${{ classical: "Operation log · classical", agentic: "Operation log · agentic" }}
        />
        <div className="step-label">
          <span className="step-word">${stepDescription}</span>
        </div>
      </div>

      <${DetailPanel} focusedId=${focusedId}/>

      <${Takeaways} replayKey=${replayKey}/>

      <${FooterAxis}/>
    </div>
  `
}

createRoot(document.getElementById("root")).render(html`<${App} />`)
</script>
</body>
</html>
